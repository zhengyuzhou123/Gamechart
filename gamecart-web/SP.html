<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameCart SP</title>
    <style>
      :root {
        --bg: #060a12;
        --bg-soft: #0b1220;
        --panel: #0f1828;
        --panel-hi: #162338;
        --line: #263a55;
        --text: #e9f5ff;
        --muted: #90a8c2;
        --neon: #37e9ff;
        --good: #91f4c9;
        --warn: #ffe5a8;
        --bad: #ffb1b1;
        --neon-soft: rgba(55, 233, 255, 0.18);
        --surface-edge: rgba(133, 185, 230, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Space Grotesk", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        background-image:
          radial-gradient(circle at 15% 8%, rgba(55, 233, 255, 0.14), transparent 32%),
          radial-gradient(circle at 86% 14%, rgba(55, 233, 255, 0.08), transparent 28%),
          linear-gradient(180deg, #070d17 0%, #050a12 72%, #04070d 100%);
        position: relative;
      }

      body:before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.18;
        background-image: radial-gradient(rgba(255, 255, 255, 0.35) 0.6px, transparent 0.6px);
        background-size: 3px 3px;
        mix-blend-mode: soft-light;
      }

      ::selection {
        background: rgba(55, 233, 255, 0.3);
        color: #ffffff;
      }

      .shell {
        display: grid;
        grid-template-columns: 270px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        border-right: 1px solid rgba(38, 58, 85, 0.72);
        background: rgba(11, 18, 32, 0.84);
        padding: 16px;
        position: sticky;
        top: 0;
        height: 100vh;
        backdrop-filter: blur(10px);
      }

      .brand {
        border: 1px solid rgba(38, 58, 85, 0.82);
        border-radius: 18px;
        background: rgba(15, 24, 40, 0.88);
        box-shadow: 0 12px 36px rgba(3, 8, 16, 0.52);
        padding: 14px;
        margin-bottom: 16px;
      }

      .brand .kicker {
        margin: 0;
        color: var(--neon);
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        font-weight: 700;
      }

      .brand h1 {
        margin: 8px 0 0;
        font-size: 19px;
        line-height: 1.15;
        letter-spacing: 0.01em;
      }

      .nav {
        display: grid;
        gap: 6px;
      }

      .nav-btn {
        width: 100%;
        border: 1px solid transparent;
        border-radius: 12px;
        padding: 10px 11px;
        background: transparent;
        color: var(--muted);
        font-size: 14px;
        text-align: left;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: 180ms ease;
        text-decoration: none;
      }

      .nav-btn:hover {
        border-color: rgba(55, 233, 255, 0.26);
        background: rgba(55, 233, 255, 0.06);
        color: var(--text);
      }

      .nav-btn.active {
        border-color: rgba(55, 233, 255, 0.42);
        background: rgba(55, 233, 255, 0.13);
        color: var(--text);
      }

      .side-note {
        margin-top: auto;
        border: 1px solid rgba(38, 58, 85, 0.82);
        border-radius: 14px;
        background: rgba(15, 24, 40, 0.88);
        padding: 12px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .main {
        padding: 0 18px 88px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(8px);
        background: linear-gradient(to bottom, rgba(6, 10, 18, 0.94), rgba(6, 10, 18, 0.74));
        border-bottom: 1px solid rgba(38, 58, 85, 0.55);
        padding: 16px 4px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
      }

      .topbar.scrolled {
        border-bottom-color: rgba(55, 233, 255, 0.24);
        background: linear-gradient(to bottom, rgba(7, 12, 21, 0.97), rgba(7, 12, 21, 0.86));
        box-shadow: 0 8px 22px rgba(2, 8, 18, 0.46);
      }

      .topbar .eyebrow {
        margin: 0;
        color: var(--muted);
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 700;
      }

      .topbar h2 {
        margin: 5px 0 0;
        font-size: 23px;
        line-height: 1.14;
      }

      .top-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .ghost-btn,
      .chip-btn,
      .action-btn,
      .select,
      .text-input {
        border: 1px solid rgba(38, 58, 85, 0.8);
        border-radius: 11px;
        background: rgba(12, 20, 33, 0.76);
        color: var(--text);
        transition: 170ms ease;
      }

      .ghost-btn {
        cursor: pointer;
        padding: 9px 12px;
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 600;
      }

      .ghost-btn:hover {
        border-color: rgba(55, 233, 255, 0.46);
        color: var(--text);
      }

      .counter {
        padding: 9px 12px;
        font-size: 12px;
        color: var(--muted);
        border-radius: 11px;
        border: 1px solid rgba(38, 58, 85, 0.8);
        background: rgba(12, 20, 33, 0.76);
      }

      .page {
        animation: fadeIn 260ms ease-out;
        display: grid;
        gap: 20px;
        padding-top: 16px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .surface {
        border: 1px solid rgba(38, 58, 85, 0.86);
        border-radius: 18px;
        background: rgba(15, 24, 40, 0.92);
        box-shadow: 0 12px 36px rgba(3, 8, 16, 0.52);
        position: relative;
        overflow: clip;
      }

      .surface-hi {
        border: 1px solid rgba(38, 58, 85, 0.92);
        border-radius: 22px;
        background: rgba(22, 35, 56, 0.9);
        box-shadow: 0 18px 42px rgba(2, 8, 18, 0.72);
        position: relative;
        overflow: clip;
      }

      .surface:before,
      .surface-hi:before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(150deg, var(--surface-edge), transparent 46%);
        opacity: 0.9;
      }

      .section-head {
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 10px;
      }

      .section-head h3 {
        margin: 0;
        font-size: 19px;
      }

      .section-head p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .hero {
        padding: 24px;
        position: relative;
        overflow: hidden;
      }

      .hero:before {
        content: "";
        position: absolute;
        right: -140px;
        top: -160px;
        width: 460px;
        height: 460px;
        background: radial-gradient(circle, rgba(55, 233, 255, 0.2), rgba(55, 233, 255, 0));
      }

      .hero .kicker {
        margin: 0;
        color: var(--neon);
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        font-weight: 700;
      }

      .hero h1 {
        margin: 10px 0 0;
        font-size: clamp(30px, 5.2vw, 48px);
        line-height: 1.04;
        letter-spacing: 0.01em;
      }

      .hero p {
        margin: 10px 0 0;
        color: var(--muted);
        max-width: 710px;
        font-size: 14px;
        line-height: 1.45;
      }

      .hero-search {
        margin-top: 18px;
        width: min(650px, 100%);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px 14px;
        border: 1px solid rgba(38, 58, 85, 0.9);
        border-radius: 13px;
        background: rgba(9, 15, 25, 0.78);
        color: var(--muted);
        transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
      }

      .hero-search:hover {
        border-color: rgba(55, 233, 255, 0.55);
        background: rgba(9, 15, 25, 0.9);
        transform: translateY(-1px);
      }

      .hero-search kbd {
        border: 1px solid rgba(38, 58, 85, 0.9);
        border-radius: 7px;
        padding: 2px 8px;
        font-size: 11px;
        color: var(--text);
        background: rgba(13, 21, 35, 0.9);
      }

      .h-scroll {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .h-scroll::-webkit-scrollbar {
        height: 8px;
      }

      .h-scroll::-webkit-scrollbar-thumb {
        background: rgba(36, 56, 80, 0.8);
        border-radius: 999px;
      }

      .hero-metrics {
        margin-top: 14px;
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .metric-card {
        border: 1px solid rgba(38, 58, 85, 0.86);
        border-radius: 12px;
        background: rgba(9, 15, 25, 0.74);
        padding: 9px;
      }

      .metric-card .k {
        color: var(--muted);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.13em;
        font-weight: 700;
      }

      .metric-card .v {
        margin-top: 6px;
        font-size: 16px;
        line-height: 1.05;
        font-weight: 700;
      }

      .card {
        min-width: 286px;
        max-width: 322px;
        border: 1px solid rgba(38, 58, 85, 0.86);
        border-radius: 20px;
        overflow: hidden;
        background: rgba(18, 30, 49, 0.95);
        box-shadow: 0 10px 24px rgba(4, 10, 20, 0.5);
        transition: transform 190ms ease, box-shadow 190ms ease, border-color 190ms ease;
        position: relative;
        transform-origin: center;
      }

      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 18px 30px rgba(2, 8, 18, 0.7);
        border-color: rgba(55, 233, 255, 0.35);
      }

      .cover {
        width: 100%;
        height: 178px;
        object-fit: cover;
        display: block;
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(2, 8, 16, 0.9), rgba(2, 8, 16, 0.08));
      }

      .card-content {
        position: absolute;
        inset: 0;
        display: grid;
        align-content: end;
        gap: 8px;
        padding: 12px;
      }

      .title {
        margin: 0;
        font-size: 16px;
        line-height: 1.1;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .chip,
      .pill {
        border-radius: 999px;
        border: 1px solid rgba(38, 58, 85, 0.9);
        background: rgba(9, 15, 25, 0.72);
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
        padding: 4px 8px;
      }

      .chip.neon,
      .pill.active {
        border-color: rgba(55, 233, 255, 0.42);
        background: rgba(55, 233, 255, 0.12);
        color: var(--neon);
        box-shadow: 0 0 0 1px rgba(55, 233, 255, 0.12), 0 0 18px rgba(55, 233, 255, 0.12);
      }

      .progress-track {
        width: 100%;
        height: 6px;
        background: rgba(9, 15, 25, 0.86);
        border-radius: 999px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, rgba(55, 233, 255, 0.65), rgba(55, 233, 255, 1));
      }

      .small-meta {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        color: var(--muted);
        font-size: 11px;
      }

      .grid {
        display: grid;
        gap: 12px;
      }

      .grid.cards-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .grid.cards-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .deal,
      .foryou,
      .wishlist-row,
      .setting-card {
        padding: 13px;
      }

      .deal h4,
      .foryou h4,
      .wishlist-row h4,
      .setting-card h4 {
        margin: 0;
        font-size: 15px;
      }

      .muted {
        color: var(--muted);
      }

      .tiny {
        font-size: 12px;
      }

      .split {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 9px;
      }

      .stat {
        border: 1px solid rgba(38, 58, 85, 0.86);
        border-radius: 10px;
        background: rgba(9, 15, 25, 0.76);
        padding: 8px;
      }

      .stat p {
        margin: 0;
      }

      .stat .label {
        color: var(--muted);
        font-size: 11px;
      }

      .stat .val {
        margin-top: 4px;
        font-size: 13px;
        font-weight: 700;
      }

      .action-row {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .action-btn,
      .chip-btn {
        cursor: pointer;
        padding: 7px 10px;
        font-size: 11px;
        font-weight: 700;
        transition: border-color 170ms ease, background 170ms ease, transform 170ms ease;
      }

      .action-btn:hover,
      .chip-btn:hover,
      .select:hover,
      .text-input:hover {
        border-color: rgba(55, 233, 255, 0.48);
        transform: translateY(-1px);
      }

      .action-btn:focus-visible,
      .chip-btn:focus-visible,
      .ghost-btn:focus-visible,
      .nav-btn:focus-visible,
      .pill:focus-visible,
      .text-input:focus-visible,
      .select:focus-visible {
        outline: 2px solid rgba(55, 233, 255, 0.55);
        outline-offset: 1px;
      }

      .filter-wrap {
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .filter-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }

      .filter-row .label {
        color: var(--muted);
        font-size: 10px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        font-weight: 700;
        margin-right: 4px;
      }

      .pill {
        cursor: pointer;
      }

      .catalog {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .lib-card {
        border: 1px solid rgba(38, 58, 85, 0.84);
        border-radius: 18px;
        overflow: hidden;
        background: rgba(18, 30, 49, 0.95);
        position: relative;
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }

      .lib-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 16px 28px rgba(2, 8, 18, 0.7);
        border-color: rgba(55, 233, 255, 0.33);
      }

      .lib-cover {
        width: 100%;
        height: 178px;
        object-fit: cover;
        display: block;
      }

      .lib-content {
        padding: 11px;
        display: grid;
        gap: 7px;
      }

      .lib-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        opacity: 0;
        transform: translateY(8px);
        transition: 170ms ease;
      }

      .lib-card:hover .lib-actions {
        opacity: 1;
        transform: translateY(0);
      }

      .spotlight {
        overflow: hidden;
      }

      .spotlight img {
        width: 100%;
        height: 240px;
        object-fit: cover;
        display: block;
      }

      .spotlight .body {
        padding: 16px;
        display: grid;
        gap: 9px;
      }

      .text-input,
      .select {
        width: 100%;
        font-size: 13px;
        padding: 10px 11px;
      }

      .split-2 {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .intel-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .intel-card {
        border: 1px solid rgba(38, 58, 85, 0.86);
        border-radius: 14px;
        background: rgba(9, 15, 25, 0.76);
        padding: 10px;
        display: grid;
        gap: 8px;
      }

      .rating-line {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
      }

      .rating-line .k {
        color: var(--muted);
      }

      .rating-line .v {
        color: var(--text);
        font-weight: 700;
      }

      .links-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .link-chip {
        border: 1px solid rgba(55, 233, 255, 0.34);
        border-radius: 999px;
        background: rgba(55, 233, 255, 0.1);
        color: var(--neon);
        font-size: 11px;
        font-weight: 700;
        padding: 4px 8px;
        text-decoration: none;
      }

      .link-chip:hover {
        border-color: rgba(55, 233, 255, 0.55);
        background: rgba(55, 233, 255, 0.16);
      }

      .wishlist-list {
        display: grid;
        gap: 10px;
      }

      .wishlist-item {
        display: grid;
        gap: 10px;
        grid-template-columns: 220px 1fr;
        align-items: stretch;
      }

      .wishlist-item .thumb {
        width: 100%;
        border-radius: 12px;
        object-fit: cover;
        height: 148px;
      }

      .price-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .spark {
        border: 1px solid rgba(38, 58, 85, 0.86);
        border-radius: 9px;
        background: rgba(8, 13, 22, 0.72);
        height: 46px;
      }

      .empty {
        border: 1px dashed rgba(38, 58, 85, 0.9);
        border-radius: 14px;
        background: rgba(11, 18, 32, 0.76);
        padding: 26px;
        text-align: center;
        color: var(--muted);
      }

      .empty h4 {
        margin: 0 0 7px;
        color: var(--text);
        font-size: 16px;
      }

      .overlay-layer {
        position: fixed;
        inset: 0;
        background: rgba(2, 8, 16, 0.66);
        backdrop-filter: blur(4px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 170ms ease;
        z-index: 70;
      }

      .overlay-layer.open {
        opacity: 1;
        pointer-events: auto;
      }

      .palette {
        position: fixed;
        top: 72px;
        left: 50%;
        transform: translateX(-50%) scale(0.98);
        width: min(92vw, 780px);
        border: 1px solid rgba(38, 58, 85, 0.95);
        border-radius: 16px;
        background: rgba(19, 31, 49, 0.96);
        box-shadow: 0 18px 42px rgba(2, 8, 18, 0.72);
        z-index: 80;
        opacity: 0;
        pointer-events: none;
        transition: 170ms ease;
      }

      .palette.open {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) scale(1);
      }

      .palette .head {
        border-bottom: 1px solid rgba(38, 58, 85, 0.86);
        padding: 10px;
      }

      .palette .list {
        max-height: 360px;
        overflow: auto;
        padding: 7px;
        display: grid;
        gap: 4px;
      }

      .cmd-item {
        width: 100%;
        border: 1px solid transparent;
        border-radius: 10px;
        background: transparent;
        color: var(--muted);
        text-align: left;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
        cursor: pointer;
        padding: 8px 10px;
      }

      .cmd-item:hover,
      .cmd-item.active {
        border-color: rgba(55, 233, 255, 0.32);
        background: rgba(55, 233, 255, 0.12);
        color: var(--text);
      }

      .palette .list::-webkit-scrollbar,
      .drawer-list::-webkit-scrollbar {
        width: 9px;
      }

      .palette .list::-webkit-scrollbar-thumb,
      .drawer-list::-webkit-scrollbar-thumb {
        background: rgba(36, 56, 80, 0.85);
        border-radius: 999px;
      }

      .drawer-wrap {
        position: fixed;
        inset: 0;
        z-index: 85;
        pointer-events: none;
      }

      .drawer-wrap.open {
        pointer-events: auto;
      }

      .drawer-bg {
        position: absolute;
        inset: 0;
        background: rgba(2, 8, 16, 0.66);
        opacity: 0;
        transition: 170ms ease;
      }

      .drawer-wrap.open .drawer-bg {
        opacity: 1;
      }

      .drawer {
        position: absolute;
        top: 0;
        right: 0;
        width: min(95vw, 420px);
        height: 100%;
        background: rgba(19, 31, 49, 0.97);
        border-left: 1px solid rgba(38, 58, 85, 0.9);
        box-shadow: -18px 0 34px rgba(2, 8, 18, 0.68);
        transform: translateX(100%);
        transition: transform 190ms ease;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .drawer-wrap.open .drawer {
        transform: translateX(0);
      }

      .drawer-head {
        padding: 14px;
        border-bottom: 1px solid rgba(38, 58, 85, 0.84);
        display: flex;
        justify-content: space-between;
        align-items: start;
      }

      .drawer-list {
        padding: 10px;
        overflow: auto;
        display: grid;
        gap: 8px;
      }

      .drawer-item {
        border: 1px solid rgba(38, 58, 85, 0.86);
        border-radius: 12px;
        background: rgba(9, 15, 25, 0.78);
        padding: 9px;
        display: grid;
        gap: 8px;
      }

      function parseRoute() {
        const raw = (location.hash || "#dashboard").slice(1);
        const [pagePart, queryPart = ""] = raw.split("?");
        const valid = NAV_ITEMS.some((item) => item.id === pagePart);
        const route = valid ? pagePart : "dashboard";
        const params = new URLSearchParams(queryPart);
        state.route = route;
        state.focusGameId = params.get("focus");
      }

      function setRoute(route, options = {}) {
        const params = new URLSearchParams();
        if (options.focus) params.set("focus", options.focus);
        const hash = params.toString() ? `#${route}?${params.toString()}` : `#${route}`;
        if (location.hash !== hash) {
          location.hash = hash;
          return;
        }
        parseRoute();
        render();
      }

      function formatCurrency(value) {
        return new Intl.NumberFormat(undefined, {
          style: "currency",
          currency: state.currency,
          minimumFractionDigits: state.currency === "JPY" ? 0 : 2,
          maximumFractionDigits: state.currency === "JPY" ? 0 : 2
        }).format(value);
      }

      function dropPct(current, previous) {
        if (!(previous > 0) || current >= previous) return 0;
        return Math.round(((previous - current) / previous) * 100);
      }

      function sparkPath(values, width = 176, height = 42, pad = 4) {
        const min = Math.min(...values);
        const max = Math.max(...values);
        const span = Math.max(0.01, max - min);
        return values
          .map((value, i) => {
            const x = pad + (i / (values.length - 1)) * (width - pad * 2);
            const y = pad + ((max - value) / span) * (height - pad * 2);
            return `${i === 0 ? "M" : "L"}${x.toFixed(1)} ${y.toFixed(1)}`;
          })
          .join(" ");
      }

      function getGames(ids) {

        const fallback = {
          steam: { media: game.criticScore, user: game.playerScore },
          playStation: { media: game.criticScore, user: 4.5 },
          metacritic: {
            media: game.criticScore,
            user: game.playerScore,
            url: `https://www.metacritic.com/search/${encodeURIComponent(game.title)}/?category=13`
          }
        };
        return REVIEW_MATRIX[game.id] || fallback;
      }

        if (!(game.currentPrice > 0)) return "--";

      }

      function dashboardSnapshot() {
        const totalGames = GAMES.length;
        const activeDeals = GAMES.filter((game) => dropPct(game.currentPrice, game.previousPrice) > 0).length;
        const metaAvg = Math.round(
          GAMES.reduce((sum, game) => sum + gameReview(game).metacritic.media, 0) / Math.max(1, totalGames)

            if (!(game.currentPrice > 0)) return sum;
            return sum + playtimeHours(game) / game.currentPrice;

        return { totalGames, activeDeals, metaAvg, valueAvg };

        sidebar.innerHTML = `
          <div style="height: 100%; display: grid; grid-template-rows: auto auto 1fr auto; gap: 10px;">
            <div class="brand">
              <p class="kicker">GameCart</p>
              <h1>One Library. Two Worlds.</h1>
            </div>
            <nav class="nav">${NAV_ITEMS.map((item) => navButton(item, item.id === state.route)).join("")}</nav>
            <div></div>
            <div class="side-note">Steam + PlayStation shelf intelligence with quick compare and momentum-driven picks.</div>
          </div>
        `;
      }

      function renderTopbar() {
        const title = NAV_ITEMS.find((item) => item.id === state.route)?.label || "Dashboard";
        topbar.innerHTML = `
          <div>
            <p class="eyebrow">Platform Hub</p>
            <h2>${title}</h2>
          </div>
          <div class="top-actions">
            <button class="ghost-btn" type="button" data-action="openPalette">Search <kbd style="font-size: 10px; border: 1px solid rgba(38,58,85,.88); border-radius: 7px; padding: 2px 6px; color: var(--text)">Cmd/Ctrl+K</kbd></button>
            <button class="counter" type="button" data-action="openCompare">Tonight ${state.tonightIds.length} • Compare ${state.compareIds.length}</button>
          </div>
        `;
        compareFab.textContent = `Compare (${state.compareIds.length})`;
      }

      function sectionHead(title, subtitle) {
        return `<div class="section-head"><div><h3>${title}</h3><p>${subtitle}</p></div></div>`;
      }

      function renderContinueCard(game) {
        const review = gameReview(game);
        return `
          <article class="card">
            <img class="cover" src="${game.cover}" alt="${game.title}" loading="lazy" />
            <div class="overlay"></div>
            <div class="card-content">
              <div class="chips">
                <span class="chip">${game.primaryPlatform}</span>
                <span class="chip neon">${game.progress}%</span>
              </div>
              <h4 class="title">${game.title}</h4>
              <p class="subtitle">${game.subtitle}</p>
              <div class="progress-track"><div class="progress-bar" style="width: ${Math.max(0, Math.min(100, game.progress))}%"></div></div>
              <div class="small-meta"><span>${game.lastPlayed}</span><span>${formatCurrency(game.currentPrice)}</span></div>
              <div class="small-meta"><span>MC ${Math.round(review.metacritic.media)}</span><span>User ${Number(review.metacritic.user).toFixed(1)}</span></div>
            </div>
          </article>
        `;
      }

      function renderDashboard() {
        const continueGames = getGames(CONTINUE_IDS);
        const dealGames = getGames(DEAL_IDS);
        const recGames = getGames(FOR_YOU_IDS);
        const snap = dashboardSnapshot();

        return `
          <section class="surface-hi hero">
            <p class="kicker">Game Platform</p>
            <h1>One Library. Two Worlds.</h1>
            <p>Steam and PlayStation collections in one shelf, with instant price intelligence and game-DNA recommendations.</p>
            <button type="button" class="hero-search" data-action="openPalette">
              <span>Search games, pages, commands</span>
              <kbd>Cmd/Ctrl + K</kbd>
            </button>
            <div class="hero-metrics">
              <article class="metric-card"><p class="k">Catalog</p><p class="v">${snap.totalGames} Titles</p></article>
              <article class="metric-card"><p class="k">Active Deals</p><p class="v">${snap.activeDeals}</p></article>
              <article class="metric-card"><p class="k">Avg MC</p><p class="v">${snap.metaAvg}/100</p></article>
              <article class="metric-card"><p class="k">Avg Value</p><p class="v">${snap.valueAvg}h/$</p></article>
            </div>
          </section>

          <section>
            ${sectionHead("Continue Playing", "Resume where momentum is strongest.")}
            <div class="h-scroll">${continueGames.map(renderContinueCard).join("")}</div>
          </section>

          <section>
            ${sectionHead("Deals Radar", "Price drops and near all-time-low windows.")}
            <div class="grid cards-4">
              ${dealGames
                .map((game) => {
                  const review = gameReview(game);
                  const drop = dropPct(game.currentPrice, game.previousPrice);
                  const gap = Math.max(0, Math.round(((game.currentPrice - game.lowestPrice) / game.lowestPrice) * 100));
                  return `
                    <article class="surface deal">
                      <div class="split">
                        <h4>${game.title}</h4>
                        <span class="chip ${drop > 0 ? "neon" : ""}">${drop > 0 ? `-${drop}%` : "Stable"}</span>
                      </div>
                      <p class="muted tiny" style="margin: 7px 0 0">Current ${formatCurrency(game.currentPrice)}</p>
                      <div class="stats">
                        <div class="stat"><p class="label">Lowest</p><p class="val" style="color: var(--neon)">${formatCurrency(game.lowestPrice)}</p></div>
                        <div class="stat"><p class="label">Gap vs ATL</p><p class="val">+${gap}%</p></div>
                      </div>
                      <p class="muted tiny" style="margin: 8px 0 0">${reviewSnippet(game)}</p>
                      <div class="action-row">
                        <button type="button" class="action-btn" data-action="compare" data-id="${game.id}">Compare</button>
                        <button type="button" class="action-btn" data-action="details" data-id="${game.id}">Details</button>
                        <a class="link-chip" href="${review.metacritic.url}" target="_blank" rel="noopener noreferrer">MC</a>
                      </div>
                    </article>
                  `;
                })
                .join("")}
            </div>
          </section>

          <section>
            ${sectionHead("For You", "Recommendations clustered by Game DNA.")}
            <div class="grid cards-4">
              ${recGames
                .map(
                  (game) => `
                  <article class="surface-hi foryou">
                    <div class="split"><h4>${game.title}</h4><span class="chip">${game.primaryPlatform}</span></div>
                    <p class="muted tiny" style="margin: 6px 0 0">${game.genre.join(" • ")}</p>
                    <div class="chips" style="margin-top: 8px">${game.dnaTags.map((tag) => `<span class="chip">${tag}</span>`).join("")}</div>
                    <p class="muted tiny" style="margin: 8px 0 0">${reviewSnippet(game)}</p>
                    <div class="small-meta" style="margin-top: 9px"><span>${playtimeHours(game)}h playtime</span><span>${valueHoursPerDollar(game)}h / $</span></div>
                    <div class="action-row"><button type="button" class="action-btn" data-action="details" data-id="${game.id}">Details</button><button type="button" class="action-btn" data-action="compare" data-id="${game.id}">Compare</button></div>
                  </article>
                `
                )
                .join("")}
            </div>
          </section>
        `;
      }

      function renderReviewIntel(game) {
        const review = gameReview(game);
        return `
          <article class="intel-card">
            <h4 style="margin: 0">Review Matrix</h4>
            <div class="rating-line"><span class="k">Steam media / user</span><span class="v">${formatCritic(review.steam.media)} · ${formatSteamUser(review.steam.user)}</span></div>
            <div class="rating-line"><span class="k">PS media / user</span><span class="v">${formatCritic(review.playStation.media)} · ${formatPsUser(review.playStation.user)}</span></div>
            <div class="rating-line"><span class="k">Metacritic media / user</span><span class="v">${formatCritic(review.metacritic.media)} · ${formatMcUser(review.metacritic.user)}</span></div>
            <div class="links-row">
              <a class="link-chip" href="${review.metacritic.url}" target="_blank" rel="noopener noreferrer">Metacritic</a>
              <a class="link-chip" href="https://store.steampowered.com/search/?term=${encodeURIComponent(game.title)}" target="_blank" rel="noopener noreferrer">Steam</a>
              <a class="link-chip" href="https://store.playstation.com/en-us/search/${encodeURIComponent(game.title)}" target="_blank" rel="noopener noreferrer">PS Store</a>
            </div>
          </article>
        `;
      }

      function renderPlayerIntel(game) {
        const drop = dropPct(game.currentPrice, game.previousPrice);
        return `
          <article class="intel-card">
            <h4 style="margin: 0">Player Snapshot</h4>
            <div class="rating-line"><span class="k">Genres</span><span class="v">${game.genre.join(" / ")}</span></div>
            <div class="rating-line"><span class="k">Multiplayer</span><span class="v">${game.multiplayer ? "Yes" : "No"}</span></div>
            <div class="rating-line"><span class="k">Progress</span><span class="v">${game.progress}%</span></div>
            <div class="rating-line"><span class="k">Playtime est.</span><span class="v">${playtimeHours(game)}h</span></div>
            <div class="rating-line"><span class="k">Decision hint</span><span class="v">${drop > 0 ? `Drop ${drop}% now` : "Track for next drop"}</span></div>
          </article>
        `;
      }

      function renderPriceIntel(game) {
        const gap = Math.max(0, Math.round(((game.currentPrice - game.lowestPrice) / game.lowestPrice) * 100));
        return `
          <article class="intel-card">
            <h4 style="margin: 0">Price Intelligence</h4>
            <div class="rating-line"><span class="k">Current</span><span class="v">${formatCurrency(game.currentPrice)}</span></div>
            <div class="rating-line"><span class="k">Previous</span><span class="v">${formatCurrency(game.previousPrice)}</span></div>
            <div class="rating-line"><span class="k">Historical low</span><span class="v">${formatCurrency(game.lowestPrice)}</span></div>
            <div class="rating-line"><span class="k">Gap vs ATL</span><span class="v">+${gap}%</span></div>
            <div class="rating-line"><span class="k">Value</span><span class="v">${valueHoursPerDollar(game)}h per $</span></div>
          </article>
        `;
      }

      function renderDiscover() {
        const focus = gameMap.get(state.focusGameId) || GAMES[0];
        const focusReview = gameReview(focus);
        const q = state.discoverQuery.trim().toLowerCase();
        const filtered = q
          ? GAMES.filter((game) => `${game.title} ${game.genre.join(" ")} ${game.subtitle}`.toLowerCase().includes(q))
          : GAMES;

        return `
          <section class="surface-hi spotlight">
            <img src="${focus.hero}" alt="${focus.title}" />
            <div class="body">
              <div class="chips"><span class="chip neon">Spotlight</span><span class="chip">${focus.primaryPlatform}</span></div>
              <h3 style="margin: 0; font-size: 28px; line-height: 1.08">${focus.title}</h3>
              <p class="muted" style="margin: 0">${focus.subtitle}</p>
              <div class="chips">${focus.dnaTags.map((tag) => `<span class="chip">${tag}</span>`).join("")}</div>
              <p class="muted tiny" style="margin: 0">${reviewSnippet(focus)}</p>
              <div class="small-meta"><span>${playtimeHours(focus)}h playtime</span><span>${valueHoursPerDollar(focus)}h/$</span></div>
              <div class="action-row">
                <button type="button" class="action-btn" data-action="compare" data-id="${focus.id}">Compare</button>
                <button type="button" class="action-btn" data-action="wishlist" data-id="${focus.id}">${state.wishlistIds.has(focus.id) ? "Wishlisted" : "Wishlist"}</button>
                <a class="link-chip" href="${focusReview.metacritic.url}" target="_blank" rel="noopener noreferrer">Metacritic</a>
              </div>
            </div>
          </section>

          <section>
            ${sectionHead("Deep Intel", "Maximum-signal snapshot for platform choice and timing.")}
            <div class="intel-grid">
              ${renderReviewIntel(focus)}
              ${renderPlayerIntel(focus)}
              ${renderPriceIntel(focus)}
            </div>
          </section>

          <section>
            ${sectionHead("Explore Catalog", "Filter by title, genre, and play style.")}
            <input id="discoverSearch" class="text-input" placeholder="Search title, genre, vibe" value="${escapeHtml(state.discoverQuery)}" />
            <div style="height: 10px"></div>
            ${filtered.length
              ? `<div class="catalog">${filtered.map(renderLibraryCard).join("")}</div>`
              : `<div class="empty"><h4>No discovery matches</h4><p>Try broader keywords.</p></div>`}
          </section>
        `;
      }

      function renderLibraryCard(game) {
        const review = gameReview(game);
        return `
          <article class="lib-card">
            <img class="lib-cover" src="${game.cover}" alt="${game.title}" loading="lazy" />
            <div class="lib-content">
              <div class="chips"><span class="chip">${game.primaryPlatform}</span><span class="chip">${game.genre[0]}</span></div>
              <h4 class="title" style="font-size: 15px">${game.title}</h4>
              <p class="subtitle">${game.subtitle}</p>
              <div class="small-meta"><span>${formatCurrency(game.currentPrice)}</span><span>${valueHoursPerDollar(game)}h/$</span></div>
              <p class="muted tiny" style="margin: 0">${reviewSnippet(game)}</p>
              <div class="lib-actions">
                <button type="button" class="action-btn" data-action="tonight" data-id="${game.id}">Add to Tonight</button>
                <button type="button" class="action-btn" data-action="compare" data-id="${game.id}">Compare</button>
                <button type="button" class="action-btn" data-action="details" data-id="${game.id}">Details</button>
                <button type="button" class="action-btn" data-action="wishlist" data-id="${game.id}">${state.wishlistIds.has(game.id) ? "Wishlisted" : "Wishlist"}</button>
                <a class="link-chip" href="${review.metacritic.url}" target="_blank" rel="noopener noreferrer">MC</a>
              </div>
            </div>
          </article>
        `;
      }

      function filteredLibraryGames() {
        const filters = state.libraryFilters;
        return GAMES.filter((game) => {
          if (filters.platform !== "All" && !game.platforms.includes(filters.platform)) return false;
          if (filters.genre !== "All" && !game.genre.includes(filters.genre)) return false;
          if (filters.multiplayer === "Multiplayer" && !game.multiplayer) return false;
          if (filters.multiplayer === "Single-player" && game.multiplayer) return false;
          if (filters.completed === "Completed" && !game.completed) return false;
          if (filters.completed === "In Progress" && game.completed) return false;
          if (filters.recent === "Recently Played" && !game.recentlyPlayed) return false;
          if (filters.recent === "Backlog" && game.recentlyPlayed) return false;
          return true;
        });
      }

      function renderPills(type, options, active) {
        return options
          .map(
            (option) =>
              `<button type="button" class="pill ${option === active ? "active" : ""}" data-filter="${type}" data-value="${escapeAttr(option)}">${option}</button>`
          )
          .join("");
      }

      function renderLibrary() {
        const genres = ["All", ...Array.from(new Set(GAMES.flatMap((g) => g.genre))).slice(0, 10)];
        const games = filteredLibraryGames();

        return `
          <section>
            ${sectionHead("Library", "Filter by platform, genre, multiplayer, completion, and recency.")}
            <div class="surface filter-wrap">
              <div class="filter-row"><span class="label">Platform</span>${renderPills("platform", ["All", "Steam", "PlayStation"], state.libraryFilters.platform)}</div>
              <div class="filter-row"><span class="label">Genre</span>${renderPills("genre", genres, state.libraryFilters.genre)}</div>
              <div class="filter-row"><span class="label">Multiplayer</span>${renderPills("multiplayer", ["All", "Multiplayer", "Single-player"], state.libraryFilters.multiplayer)}</div>
              <div class="filter-row"><span class="label">Completed</span>${renderPills("completed", ["All", "Completed", "In Progress"], state.libraryFilters.completed)}</div>
              <div class="filter-row"><span class="label">Recency</span>${renderPills("recent", ["All", "Recently Played", "Backlog"], state.libraryFilters.recent)}</div>
            </div>
          </section>

          <section>
            ${games.length ? `<div class="catalog">${games.map(renderLibraryCard).join("")}</div>` : `<div class="empty"><h4>No games fit this loadout</h4><p>Try resetting one filter pill.</p></div>`}
          </section>
        `;
      }

      function renderWishlist() {
        const games = Array.from(state.wishlistIds)
          .map((id) => gameMap.get(id))
          .filter(Boolean);

        if (!games.length) {
          return `<div class="empty"><h4>Wishlist is empty</h4><p>Use Add to Wishlist from Discover or Library cards.</p></div>`;
        }

        return `
          <section>
            ${sectionHead("Wishlist", "Price tracking with lowest price badges and trend placeholders.")}
            <div class="wishlist-list">
              ${games
                .map((game) => {
                  const review = gameReview(game);
                  const drop = dropPct(game.currentPrice, game.previousPrice);
                  const atlBadge = game.currentPrice <= game.lowestPrice ? "Historical Low" : "Tracking";
                  return `
                    <article class="surface-hi wishlist-row wishlist-item">
                      <img class="thumb" src="${game.cover}" alt="${game.title}" loading="lazy" />
                      <div>
                        <div class="split"><h4>${game.title}</h4><div class="chips"><span class="chip ${drop > 0 ? "neon" : ""}">${drop > 0 ? `-${drop}%` : "Stable"}</span><span class="chip">${game.primaryPlatform}</span></div></div>
                        <p class="muted tiny" style="margin: 6px 0 0">${game.subtitle}</p>
                        <div class="price-grid" style="margin-top: 9px">
                          <div class="stat"><p class="label">Current</p><p class="val">${formatCurrency(game.currentPrice)}</p></div>
                          <div class="stat"><p class="label">Lowest</p><p class="val" style="color: var(--neon)">${formatCurrency(game.lowestPrice)}</p></div>
                          <div class="stat"><p class="label">Badge</p><p class="val">${atlBadge}</p></div>
                        </div>
                        <div style="margin-top: 10px">
                          <p class="muted tiny" style="margin: 0 0 4px">Price Curve</p>
                          <svg class="spark" viewBox="0 0 176 42"><path d="${sparkPath(game.priceHistory)}" fill="none" stroke="var(--neon)" stroke-width="2" stroke-linecap="round" /></svg>
                        </div>
                        <p class="muted tiny" style="margin: 8px 0 0">${reviewSnippet(game)}</p>
                        <div class="action-row">
                          <button type="button" class="action-btn" data-action="compare" data-id="${game.id}">Compare</button>
                          <button type="button" class="action-btn" data-action="details" data-id="${game.id}">Details</button>
                          <button type="button" class="action-btn" data-action="wishlist" data-id="${game.id}">Remove</button>
                          <a class="link-chip" href="${review.metacritic.url}" target="_blank" rel="noopener noreferrer">MC</a>
                        </div>
                      </div>
                    </article>
                  `;
                })
                .join("")}
            </div>
          </section>
        `;
      }

      function renderSettings() {
        return `
          <section>
            ${sectionHead("Settings", "Control store region, currency, and alert behavior.")}
            <div class="split-2">
              <article class="surface setting-card">
                <h4>Store Defaults</h4>
                <p class="muted tiny" style="margin: 6px 0 10px">Affects display currency and browsing region tags.</p>
                <label class="muted tiny" for="regionSelect">Region</label>
                <select id="regionSelect" class="select" style="margin-top: 4px">
                  ${["US", "JP", "GB"].map((r) => `<option value="${r}" ${state.region === r ? "selected" : ""}>${r}</option>`).join("")}
                </select>
                <div style="height: 8px"></div>
                <label class="muted tiny" for="currencySelect">Currency</label>
                <select id="currencySelect" class="select" style="margin-top: 4px">
                  ${["USD", "JPY", "GBP"].map((c) => `<option value="${c}" ${state.currency === c ? "selected" : ""}>${c}</option>`).join("")}
                </select>
              </article>

              <article class="surface setting-card">
                <h4>Alerts & Presence</h4>
                <p class="muted tiny" style="margin: 6px 0 10px">Theme is locked to premium dark mode with one neon accent.</p>
                <label style="display: flex; align-items: center; justify-content: space-between; gap: 10px; border: 1px solid rgba(38,58,85,.86); border-radius: 11px; background: rgba(9,15,25,.75); padding: 10px">
                  <span>
                    <strong style="display: block; font-size: 13px">Price drop alerts</strong>
                    <span class="muted tiny">Notify on wishlist historical-low windows.</span>
                  </span>
                  <input id="alertsToggle" type="checkbox" ${state.alerts ? "checked" : ""} />
                </label>
                <p class="muted tiny" style="margin-top: 12px">Double-click launch enabled via standalone SP.html (no Node runtime required).</p>
              </article>
            </div>
          </section>
        `;
      }

      function renderPage() {
        if (state.route === "dashboard") return renderDashboard();
        if (state.route === "discover") return renderDiscover();
        if (state.route === "library") return renderLibrary();
        if (state.route === "wishlist") return renderWishlist();
        if (state.route === "settings") return renderSettings();
        return renderDashboard();
      }

      function renderMobileTabs() {
        mobileTabs.innerHTML = NAV_ITEMS.map((item) => navButton(item, item.id === state.route, true)).join("");
      }

      function renderCompareDrawer() {
        const games = state.compareIds.map((id) => gameMap.get(id)).filter(Boolean);
        compareWrap.classList.toggle("open", state.compareOpen);
        compareWrap.setAttribute("aria-hidden", state.compareOpen ? "false" : "true");

        if (!games.length) {
          compareList.innerHTML = `<div class="empty"><h4>Compare queue is empty</h4><p>Add titles from Library, Dashboard, or Wishlist.</p></div>`;
          return;
        }

        compareList.innerHTML = games
          .map((game) => {
            const review = gameReview(game);
            const drop = dropPct(game.currentPrice, game.previousPrice);
            return `
              <article class="drawer-item">
                <div class="split"><h4 style="margin: 0; font-size: 14px">${game.title}</h4><button type="button" class="chip-btn" data-action="removeCompare" data-id="${game.id}">Remove</button></div>
                <div class="chips"><span class="chip">${game.primaryPlatform}</span><span class="chip ${drop > 0 ? "neon" : ""}">${drop > 0 ? `-${drop}%` : "Stable"}</span></div>
                <div class="stats">
                  <div class="stat"><p class="label">Current</p><p class="val">${formatCurrency(game.currentPrice)}</p></div>
                  <div class="stat"><p class="label">Lowest</p><p class="val" style="color: var(--neon)">${formatCurrency(game.lowestPrice)}</p></div>
                </div>
                <div class="small-meta"><span>${playtimeHours(game)}h playtime</span><span>${valueHoursPerDollar(game)}h/$</span></div>
                <p class="muted tiny" style="margin: 0">${reviewSnippet(game)}</p>
                <div class="links-row"><a class="link-chip" href="${review.metacritic.url}" target="_blank" rel="noopener noreferrer">MC</a></div>
              </article>
            `;
          })
          .join("");
      }

      function commandItems() {
        const pageItems = NAV_ITEMS.map((item) => ({ id: `page-${item.id}`, type: "page", label: `Go to ${item.label}`, hint: "Navigation", route: item.id }));
        const gameItems = GAMES.map((game) => ({ id: `game-${game.id}`, type: "game", label: game.title, hint: `${game.genre[0]} • ${game.primaryPlatform}`, gameId: game.id }));
        const items = [...pageItems, ...gameItems];
        const q = state.paletteQuery.trim().toLowerCase();
        if (!q) return items.slice(0, 10);
        return items.filter((item) => `${item.label} ${item.hint}`.toLowerCase().includes(q)).slice(0, 12);
      }

      function renderPalette() {
        paletteBackdrop.classList.toggle("open", state.paletteOpen);
        palette.classList.toggle("open", state.paletteOpen);
        palette.setAttribute("aria-hidden", state.paletteOpen ? "false" : "true");

        if (!state.paletteOpen) return;

        const items = commandItems();
        if (state.paletteActive >= items.length) state.paletteActive = Math.max(0, items.length - 1);

        paletteList.innerHTML = items.length
          ? items
              .map(
                (item, idx) => `
              <button type="button" class="cmd-item ${idx === state.paletteActive ? "active" : ""}" data-cmd="${item.id}">
                <div><strong style="display: block; font-size: 13px">${item.label}</strong><span style="font-size: 11px">${item.hint}</span></div>
                <span class="chip">${item.type}</span>
              </button>
            `
              )
              .join("")
          : `<div class="empty"><h4>No command results</h4><p>Try another keyword.</p></div>`;

        requestAnimationFrame(() => paletteInput.focus());
      }

      function render() {
        renderSidebar();
        renderTopbar();
        renderMobileTabs();
        page.innerHTML = renderPage();
        renderCompareDrawer();
        renderPalette();
      }

      function openPalette() {
        state.paletteOpen = true;
        state.paletteQuery = "";
        state.paletteActive = 0;
        renderPalette();
      }

      function closePalette() {
        state.paletteOpen = false;
        renderPalette();
      }

      function openCompare() {
        state.compareOpen = true;
        renderCompareDrawer();
      }

      function closeCompare() {
        state.compareOpen = false;
        renderCompareDrawer();
      }

      function addCompare(id) {
        if (!state.compareIds.includes(id)) {
          state.compareIds.push(id);
          if (state.compareIds.length > 5) state.compareIds.shift();
        }
        openCompare();
        renderTopbar();
      }

      function addTonight(id) {
        if (!state.tonightIds.includes(id)) {
          state.tonightIds.push(id);
          if (state.tonightIds.length > 8) state.tonightIds.shift();
        }
        renderTopbar();
      }

      function toggleWishlist(id) {
        if (state.wishlistIds.has(id)) {
          state.wishlistIds.delete(id);
        } else {
          state.wishlistIds.add(id);
        }
        render();
      }

      function runCommand(commandId) {
        const items = commandItems();
        const item = items.find((x) => x.id === commandId);
        if (!item) return;
        if (item.type === "page") {
          setRoute(item.route);
        } else {
          setRoute("discover", { focus: item.gameId });
        }
        closePalette();
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/`/g, "&#96;");
      }

      document.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof Element)) return;

        const nav = target.closest("[data-nav]");
        if (nav) {
          event.preventDefault();
          const next = nav.getAttribute("data-nav") || "dashboard";
          setRoute(next);
          return;
        }

        const actionNode = target.closest("[data-action]");
        if (actionNode) {
          const action = actionNode.getAttribute("data-action");
          const id = actionNode.getAttribute("data-id");

          if (action === "openPalette") {
            openPalette();
            return;
          }

          if (action === "closePalette") {
            closePalette();
            return;
          }

          if (action === "openCompare") {
            openCompare();
            return;
          }

          if (action === "closeCompare") {
            closeCompare();
            return;
          }

          if (action === "clearCompare") {
            state.compareIds = [];
            render();
            return;
          }

          if (action === "removeCompare" && id) {
            state.compareIds = state.compareIds.filter((x) => x !== id);
            render();
            return;
          }

          if (action === "compare" && id) {
            addCompare(id);
            return;
          }

          if (action === "tonight" && id) {
            addTonight(id);
            return;
          }

          if (action === "details" && id) {
            setRoute("discover", { focus: id });
            return;
          }

          if (action === "wishlist" && id) {
            toggleWishlist(id);
            return;
          }
        }

        const filterNode = target.closest("[data-filter]");
        if (filterNode) {
          const key = filterNode.getAttribute("data-filter");
          const value = filterNode.getAttribute("data-value");
          if (key && value && state.libraryFilters[key] !== undefined) {
            state.libraryFilters[key] = value;
            render();
          }
          return;
        }

        const cmdNode = target.closest("[data-cmd]");
        if (cmdNode) {
          runCommand(cmdNode.getAttribute("data-cmd"));
        }
      });

      document.addEventListener("input", (event) => {
        const target = event.target;
        if (!(target instanceof Element)) return;

        if (target.id === "discoverSearch") {
          state.discoverQuery = target.value;
          render();
          return;
        }

        if (target.id === "paletteInput") {
          state.paletteQuery = target.value;
          state.paletteActive = 0;
          renderPalette();
          return;
        }

        if (target.id === "regionSelect") {
          state.region = target.value;
          safeStorageSet("sp.region", state.region);
          return;
        }

        if (target.id === "currencySelect") {
          state.currency = target.value;
          safeStorageSet("sp.currency", state.currency);
          render();
          return;
        }

        if (target.id === "alertsToggle") {
          state.alerts = Boolean(target.checked);
          safeStorageSet("sp.alerts", state.alerts ? "1" : "0");
        }
      });

      paletteInput.addEventListener("keydown", (event) => {
        const items = commandItems();

        if (event.key === "ArrowDown") {
          event.preventDefault();
          state.paletteActive = Math.min(state.paletteActive + 1, Math.max(0, items.length - 1));
          renderPalette();
          return;
        }

        if (event.key === "ArrowUp") {
          event.preventDefault();
          state.paletteActive = Math.max(state.paletteActive - 1, 0);
          renderPalette();
          return;
        }

        if (event.key === "Enter") {
          event.preventDefault();
          const item = items[state.paletteActive];
          if (item) runCommand(item.id);
          return;
        }

        if (event.key === "Escape") {
          closePalette();
        }
      });

      window.addEventListener("keydown", (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "k") {
          event.preventDefault();
          if (state.paletteOpen) {
            closePalette();
          } else {
            openPalette();
          }
          return;
        }

        if (event.key === "Escape") {
          if (state.paletteOpen) closePalette();
          if (state.compareOpen) closeCompare();
        }
      });

      window.addEventListener("scroll", () => {
        topbar.classList.toggle("scrolled", window.scrollY > 8);
      });

      window.addEventListener("hashchange", () => {
        parseRoute();
        render();
      });

      if (!location.hash) {
        location.hash = "#dashboard";
      }
      parseRoute();
      render();
    </script>
  </body>
</html>
