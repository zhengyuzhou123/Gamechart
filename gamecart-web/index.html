<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameCart Web Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="kicker">Demo</p>
          <h1>Steam + PlayStation GameCart</h1>
        </div>
        <nav class="tabs" aria-label="Main navigation">
          <button class="tab-btn" data-tab="home" type="button">Home</button>
          <button class="tab-btn" data-tab="wishlist" type="button">Wishlist</button>
          <button class="tab-btn" data-tab="settings" type="button">Settings</button>
        </nav>
      </header>

      <main id="app" class="main" aria-live="polite"></main>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
